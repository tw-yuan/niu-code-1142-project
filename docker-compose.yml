services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: niu-ai-app:latest
    container_name: niu-ai-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite:////data/db/app.db"
      UPLOAD_DIR: "/data/uploads"
      GENERATED_FILE_DIR: "/data/generated"
      FRONTEND_DIST_DIR: "/app/frontend_dist"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
