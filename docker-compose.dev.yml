services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
      - ./data:/app/data

  worker:
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws
    command: npm run dev -- --host 0.0.0.0 --port 80
    environment:
      VITE_API_URL: /api
      VITE_WS_URL: /ws
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
